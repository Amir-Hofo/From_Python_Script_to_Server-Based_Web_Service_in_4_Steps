services:
  service-name:
    image: service-name:0.0.1
    container_name: service-name
    ports:
      - "8000:8000"

    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s